<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cy3borg Proxy</title>
    <style>
        body { 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0;
            padding: 50px;
            text-align: center; 
            background-color: #0d1117;
            color: #58a6ff;
        }
        .container {
            max-width: 600px;
            margin: auto;
            padding: 40px;
            background: #161b22;
            border: 2px solid #21262d;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.2);
        }
        h1 {
            color: #58a6ff;
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(88, 166, 255, 0.5);
            margin-bottom: 10px;
        }
        p {
            color: #8b949e;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }
        button { 
            padding: 15px 30px; 
            font-size: 18px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            color: #0d1117;
            background-color: #58a6ff;
            border: none;
            border-radius: 6px;
            cursor: pointer; 
            box-shadow: 0 4px 14px rgba(88, 166, 255, 0.4);
            transition: all 0.2s ease;
        }
        button:hover {
            background-color: #1f6feb;
            color: #ffffff;
            box-shadow: 0 0 25px rgba(88, 166, 255, 0.8);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>[ CY3BORG ]</h1>
        <p>Secure Web Gateway Initialization... Connected.</p>
        <a href="/proxy" target="_blank"><button>LAUNCH PROXY ROUTE</button></a>
    </div>

</html>
